<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | AGI Drinks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1 class="logo">AGI <span>ADMIN</span></h1>
            <a href="index.html" style="color: var(--gold); text-decoration: none;"><i class="fas fa-eye"></i> Ver Loja</a>
        </div>
    </header>

    <div class="admin-container">
        <h2>Cadastrar Novo Produto</h2>
        <br>
        <form id="form-produto">
            <div class="form-group">
                <label for="nome">Nome do Produto</label>
                <input type="text" id="nome" required placeholder="Ex: Vinho Malbec">
            </div>
            <div class="form-group">
                <label for="preco">Preço (R$)</label>
                <input type="number" id="preco" step="0.01" required placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="categoria">Categoria</label>
                <select id="categoria" required>
                    <option value="vinhos">Vinho</option>
                    <option value="espumantes">Espumante</option>
                    <option value="destilados">Destilado</option>
                    <option value="cervejas">Cerveja</option>
                </select>
            </div>
            <div class="form-group">
                <label for="imagem">URL da Imagem</label>
                <input type="url" id="imagem" required placeholder="https://exemplo.com/imagem.jpg">
            </div>
            <button type="submit" class="add-to-cart" style="border-radius: 4px;">Salvar Produto</button>
        </form>
    </div>

    <script src="admin.js"></script>
</body>
</html>
