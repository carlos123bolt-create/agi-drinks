<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Drinks | Adega Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header-adega">
        <div class="logo-container">
            <img src="public/logo.jpg" alt="AGI Drinks" class="logo-img" onerror="this.src='https://i.ibb.co/6wG8YpW/agi-logo-placeholder.jpg'">
            <div class="status-container">
                <span id="status-bola" class="status-bola fechado"></span>
                <span id="status-texto">Verificando horário...</span>
            </div>
        </div>
    </header>

    <main class="catalogo-container">
        <div id="categorias-container"></div>
    </main>

    <div id="barra-carrinho" class="barra-carrinho hidden" onclick="abrirModalCarrinho()">
        <div class="info-carrinho">
            <i class="fas fa-shopping-cart"></i>
            <span id="carrinho-quantidade">0</span> itens
        </div>
        <div class="ver-carrinho-btn">
            Ver Carrinho <span id="carrinho-total-barra">R$ 0,00</span>
        </div>
    </div>

    <div id="modal-carrinho" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Seu Carrinho</h2>
                <button class="close-btn" onclick="fecharModalCarrinho()">&times;</button>
            </div>
            
            <div class="modal-body">
                <div id="itens-carrinho"></div>

                <div class="secao-checkout">
                    <h3><i class="fas fa-motorcycle"></i> Como deseja receber?</h3>
                    <div class="opcoes-entrega">
                        <label class="radio-container">
                            <input type="radio" name="tipo-entrega" value="entrega" checked onclick="alterarTipoEntrega('entrega')">
                            <span class="checkmark"></span> Entrega em Casa
                        </label>
                        <label class="radio-container">
                            <input type="radio" name="tipo-entrega" value="retirada" onclick="alterarTipoEntrega('retirada')">
                            <span class="checkmark"></span> Retirar na Adega
                        </label>
                    </div>
                </div>

                <div id="secao-endereco" class="secao-checkout">
                    <h3><i class="fas fa-map-marker-alt"></i> Endereço de Entrega</h3>
                    <div class="form-group">
                        <input type="text" id="end-rua" placeholder="Rua / Avenida" class="input-text">
                    </div>
                    <div class="form-row">
                        <input type="text" id="end-numero" placeholder="Número" class="input-text">
                        <input type="text" id="end-bairro" placeholder="Bairro" class="input-text">
                    </div>
                    <div class="form-group">
                        <input type="text" id="end-referencia" placeholder="Ponto de Referência (Opcional)" class="input-text">
                    </div>
                </div>

                <div class="secao-checkout">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label for="cliente-nome" style="display: block; margin-bottom: 5px; font-weight: bold;">Nome Completo:</label>
                        <input type="text" id="cliente-nome" placeholder="Digite o seu nome e sobrenome" class="input-text" style="width: 100%;" required>
                    </div>

                    <h3><i class="fas fa-credit-card"></i> Forma de Pagamento</h3>
                    <select id="forma-pagamento" class="input-select" onchange="verificarTroco(this.value)">
                        <option value="Pix">Pix</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>

                    <div id="secao-troco" class="form-group hidden" style="margin-top: 10px;">
                        <input type="text" id="valor-troco" placeholder="Precisa de troco para quanto?" class="input-text">
                    </div>
                </div>

                <div class="resumo-valores">
                    <p>Subtotal: <span id="resumo-subtotal">R$ 0,00</span></p>
                    <p id="txt-frete-linha">Frete: <span id="resumo-frete">R$ 5,00</span></p>
                    <h4 class="total-final-texto">Total Geral: <span id="resumo-total-geral">R$ 5,00</span></h4>
                    <p id="aviso-minimo" class="erro-mensagem hidden">⚠️ Pedido mínimo para entrega é de R$ 15,00</p>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-enviar-whats" id="btn-finalizar" onclick="enviarPedidoAoWhatsApp()"><i class="fab fa-whatsapp"></i> Enviar Pedido ao WhatsApp</button>
            </div>
        </div>
    </div>

</body>
</html>
